instructions: |
  **天阶银行股投资策略（Tianjie Bank Stock Investment Strategy）**
  核心底层逻辑：
  1.  银行是全行业同质化最严重的赛道，所有银行商业模式均为息差套利，不存在商业模式的降维打击，具备同维度对比估值的基础；
  2.  银行财报具备极强的调节空间，不良率、拨备、利润均可人为调整，单一财报数据无法反映真实经营情况，投资银行股本质是「开盲盒」；
  3.  「盲盒可视化理论」：放弃对不可靠财报细节的过度解读，聚焦银行经营中**可验证、难造假、能落地**的可视化核心指标，先排除绝对无法开出优质结果的问题标的，再从剩余标的中筛选高胜率投资机会；
  4.  核心投资原则「瞻前顾后」：瞻前，追溯净资产积累对应的经营性现金流，验证资产真实性，锁定低估标的；顾后，紧盯业务边际改善信号、业绩预期差与核心股息安全垫，确保投资的确定性与收益性。

  ## 分析步骤与判定标准
  ### 第一步：标的初筛（一票否决排除法，优先级最高）
  本环节核心是剔除高风险问题标的，仅保留符合基础准入条件的银行股，出现以下任意一条直接执行一票否决，不纳入后续分析范围：
  1.  **股息率准入门槛**：
      - 使用 `get_daily_history` 获取近3年分红数据，连续3年不分红、股息率持续低于3%的标的直接排除；
      - 股息是银行股投资的核心安全垫，是银行盈利真实性的最直接验证，必须放在筛选的第一优先级。
  2.  **地域风险排除**：
      - 使用 `search_stock_news` 检索标的总部所在区域的人口流动、房价走势、经济活力数据；
      - 城商行、区域性农商行，若总部位于人口持续流出、房价大幅下跌、资源枯竭型区域，直接排除；优先选择长三角、珠三角等经济活力强区域的区域性银行。
  3.  **现金流健康度排除**：
      - 使用 `get_daily_history` 获取2015年至今的年度财务数据，计算累计经营性现金流与累计归母净利润的匹配度；
      - 近5年经营性现金流净额持续为负、累计经营性现金流显著低于累计归母净利润的标的，直接排除；
      - 股份制银行中，非息收入占比极高的头部零售银行可适度放宽标准，其余标的严格执行。
  4.  **资产真实性排除**：
      - 检索监管披露的不良贷款偏离度数据，不良贷款偏离度持续低于80%的标的直接排除，避免财报美化隐藏真实不良。

  ### 第二步：核心指标深度验证（标的排序与优选）
  对通过初筛的标的，通过以下核心指标进行优先级排序，筛选优质标的：
  1.  **现金流-净资产匹配度（核心验证指标）**：
      - 追溯2015年至今的累计经营性现金流，验证其与净资产积累的匹配程度，累计现金流覆盖净资产比例越高，标的资产真实性越强，优先级越高；
      - 五大行中，累计经营性现金流排名前列的标的优先；股份制银行中，同估值水平下现金流表现更优的标的优先。
  2.  **股息率排序**：
      - 使用 `get_realtime_quote` 获取实时股价，结合最新分红预案计算动态股息率，动态股息率≥5%的标的优先，股息率越高，安全垫越厚。
  3.  **估值水平排序**：
      - 使用 `analyze_trend` 获取个股10年PB（市净率）历史分位数据，优先选择PB处于历史30分位值以下的标的，估值处于历史10分位以内的标的重点关注。
  4.  **经营边际改善验证**：
      - 重点验证净息差走势，在行业净息差下行周期中，率先实现净息差企稳、甚至逆势回升的标的，给予最高优先级；
      - 验证高风险区域业务出清情况，过往亏损区域业务占比持续收缩、营收结构向高活力区域集中的标的，优先级提升。

  ### 第三步：估值体系与买卖信号判定
  银行股估值以**PB（市净率）为核心，PE为辅助，股息率锁定安全下限**，具体判定规则如下：
  1.  **买入信号判定**：
      - 核心买入区间：PB处于个股历史30分位值以下，同时动态股息率≥5%，且现金流-净资产匹配度达标；
      - 极致低估买入区间：PB处于个股历史10分位值以下，同时满足股息率、现金流核心要求，可提升仓位配置。
  2.  **合理估值与卖出信号判定**：
      - 常规标的合理估值中枢为0.5-0.7倍PB，头部优质零售银行可适度上调；
      - 减仓信号：PB回升至历史70分位值以上，或动态股息率回落至3%以下；
      - 清仓信号：标的触发第一步一票否决条款中的任意一条，或核心经营逻辑发生恶化。
  3.  **收益测算验证**：
      - 基于当前每股净资产、年均净资产增长、分红比例，测算5年后的净资产规模，结合合理PB估值，测算年化复合收益率，优先选择年化复合收益率（含股息）≥15%的标的。

  ### 第四步：风险排查与仓位管理
  1.  **核心风险排查**：
      - 使用 `search_stock_news` 排查标的是否存在重大监管处罚、核心区域房地产风险敞口过大、高管重大负面事件等利空信息，出现重大利空直接一票否决；
      - 持续跟踪净息差走势、不良贷款变化、核心区域经济走势，动态评估标的风险等级。
  2.  **仓位管理规则**：
      - 单一银行标的最高仓位不超过总仓位的30%，避免单一个体黑天鹅风险；
      - 对单一银行无深度研究、风险把握度低的投资者，优先选择银行ETF替代个股，同时严格规避初筛环节排除的问题标的对应的成分股权重过高的产品；
      - 银行股整体配置仓位不超过总仓位的50%，做好大类资产分散。

  ## 评分调整规则
  - 满足「历史30分位以下PB+动态股息率≥5%+现金流-净资产匹配度达标+净息差企稳」核心买入条件：sentiment_score +15
  - 满足核心买入条件，同时处于历史10分位以下极致低估区间：额外 +5
  - 标的处于历史70分位以上高估值区间，股息率低于3%：sentiment_score -10
  - 触发一票否决条款，出现重大风险信号：sentiment_score -20，直接给出离场建议
  - 在 `buy_reason` 和 `bank_stock_analysis` 中必须注明「天阶银行股投资策略」判断结果。

  ## 输出要求
  - 明确给出标的是否通过初筛，列出一票否决的核心原因（如有）；
  - 清晰标注核心指标表现：动态股息率、PB历史分位、累计经营性现金流匹配情况、净息差走势；
  - 明确给出合理买入估值区间、减仓/清仓估值区间、股息率安全下限；
  - 明确列出标的核心风险点与对应影响等级；
  - 给出明确的「买入/观望/减仓/清仓」操作建议，以及单标的仓位配置参考。

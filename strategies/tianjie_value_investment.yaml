  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - get_sector_rankings
instructions: |
  **天阶价值投资策略（Tianjie Value Investment Strategy）**
  核心底层逻辑：
  1.  以「国家战略安全」为A股5-10年投资核心主线，围绕能源安全、资源安全等国家战略方向挖掘投资机会；
  2.  价格-价值关系遵循「人遛狗模型」：价值为人（有迹可循），价格为狗（短期无规律波动），估值为绳（约束价格偏离度，长期必然向价值回归）；
  3.  第一性原理思维：摒弃冗余财务科目，抓住标的盈利核心变量，所有财务数据均为核心变量服务，拒绝「在会计科目里游泳」；
  4.  投资原则：模糊的正确远胜精准的错误，优先确保安全边际，宁可错过不可做错。

  ## 分析步骤与判定标准
  ### 第一步：顶层设计（赛道筛选，优先级最高）
  1.  **国家政策与行业痛点分析**：
      - 使用 `search_stock_news` 检索国家部委发布的行业监管、产业发展相关政策文件，明确行业准入门槛、监管要求与政策鼓励方向；
      - 拆解行业核心矛盾与「不安全痛点」，锁定能解决行业核心痛点的细分赛道，排除赛道拥挤、容量过小、已被市场充分定价的方向。
  2.  **赛道景气度验证**：
      - 使用 `get_sector_rankings` 确认赛道行业景气度、供需格局，优先选择需求稳定增长、供给端有政策壁垒的赛道；
      - 明确赛道投资的第一性原理，提炼决定赛道内企业盈利的核心底层变量。

  ### 第二步：商业模式与标的锁定
  1.  **标的唯一性与纯度验证**：
      - 优先选择赛道内**核心业务营收占比超70%**、业务与赛道逻辑强绑定的纯标的，剔除业务占比低、概念属性强的企业；
      - 确认标的商业模式：将企业视为「解决行业痛点的生产机器」，明确输入端成本核心变量、输出端产品价格核心变量，忽略非核心业务与产品。
  2.  **成长确定性验证**：
      - 使用 `get_daily_history` 获取公司公告与经营数据，确认标的有明确的在建/储备产能规划，远期产能扩张空间清晰，不受国内产能指标硬性限制；
      - 验证标的盈利韧性：核心产品价格处于历史低位时，仍能实现盈利新高，具备强成本控制能力与抗周期属性。

  ### 第三步：财务分析与基本面印证
  1.  **核心变量财务验证**：
      - 围绕赛道第一性原理的核心变量，验证对应财务结果，重点确认产能、销量、核心产品售价、原材料成本的变动对盈利的影响；
      - 盈利质量验证：重点核对经营现金流与扣非净利润的匹配度，优先选择现金流健康、具备持续分红能力的标的。
  2.  **估值体系判定（核心买卖依据）**：
      遵循「PE为主，搏取上限；PB为辅，保障下限；股息为先，进退自如；增速为次，稳定发展」的估值原则：
      1.  **PE估值（核心买入/卖出信号）**：
          - 使用 `analyze_trend` 获取个股10年PE-TTM分位数据，30分位值以下为高胜率买入区间，70分位值以上为高性价比卖出区间；
          - 横向对比同行业平均PE水平，打9折安全折扣后确定合理估值中枢，结合业绩预期测算合理股价区间。
      2.  **股息率估值（安全垫确认）**：
          - 使用 `get_realtime_quote` 获取实时股价与最新分红数据，以长期资金认可的5%股息率为基准，结合公司预期分红水平，测算股价下跌安全下限；
          - 确认标的具备稳定分红能力，派息率稳定，下跌过程中股息率提升会带来长期配置资金托底。
      3.  **辅助验证**：结合公司未来业绩增速，通过PEG指标验证PE估值的合理性，不单独作为估值依据；摒弃纯DCF现金流贴现模型，仅以股息率替代现金流做简化贴现验证。

  ### 第四步：风险排查（一票否决项）
  1.  使用 `search_stock_news` 排查标的核心风险，包括产品价格大幅波动、原材料涨价、政策变动、海外项目不确定性、实控人相关风险等，分等级评估影响大小；
  2.  出现重大利空新闻、核心经营逻辑被破坏的标的，直接执行一票否决，不纳入投资范围。

  ## 评分调整规则
  - 满足「顶层政策支持+赛道核心标的+估值处于30分位以下+股息率≥5%」：sentiment_score +15
  - 满足核心买入条件，同时具备明确的远期产能扩张规划：额外 +5
  - 估值处于70分位以上，无安全边际：sentiment_score -10
  - 出现重大利空风险、核心经营逻辑破坏：sentiment_score -20，直接给出离场建议
  - 在 `buy_reason` 和 `fundamental_analysis` 中必须注明「天阶价值投资策略」判断结果。

  ## 输出要求
  - 明确给出赛道筛选逻辑与标的核心投资逻辑；
  - 清晰标注合理买入估值区间、卖出估值区间、下跌安全垫价格；
  - 明确列出核心风险点与对应影响等级；
  - 给出明确的「买入/观望/卖出」操作建议与仓位参考。
name: tianjie_value_investment
display_name: 天阶价值投资策略
description: 基于国家战略安全主线，采用「顶层设计→商业模式→财务印证」三步分析框架，挖掘解决行业核心痛点的优质标的，通过极简估值体系划定买卖区间，适配A股中长期价值投资的可落地基本面策略。
category: framework
core_rules: [1, 5]
required_tools:
